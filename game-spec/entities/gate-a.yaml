version: 1
entities:
  - id: entity.player.solo
    archetype: player.echo_bearer
    scene: scene.ashen_threshold
    transform:
      position: { x: -3.6, y: 0.62, z: 0 }
    components:
      - type: player_controller
      - type: phase_loadout
        phases: [ember, tide, bloom, prism]

  - id: entity.enemy.hollow_grunt
    archetype: enemy.hollow_grunt
    scene: scene.ashen_threshold
    transform:
      position: { x: -1.45, y: 0.62, z: 0 }
    components:
      - type: enemy_pressure
        sense_range: 4.2
        strike_range: 1.05
        windup_seconds: 0.72

  - id: entity.object.ember_altar
    archetype: interactable.altar
    scene: scene.ashen_threshold
    transform:
      position: { x: 1.3, y: 0.24, z: 0 }
    components:
      - type: heat_receiver
        accepted_phase: ember
        threshold: 100
      - type: puzzle_state_emitter
        grants_state: state.gate_open

  - id: entity.object.claim_gate
    archetype: interactable.gate
    scene: scene.ashen_threshold
    transform:
      position: { x: 3.7, y: 0.9, z: 0 }
    components:
      - type: reward_claim
        requires:
          - state.gate_open
          - state.enemy_defeated
        grants:
          - loot.relic.ember_afterglow
