name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  codeql:
    name: CodeQL C#
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb
        with:
          languages: csharp
          build-mode: none

      - name: Analyze C#
        id: analyze
        uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb
        with:
          category: /language:csharp
          output: artifacts/codeql/sarif
          upload: always

      - name: Upload CodeQL SARIF and diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: codeql-csharp-results-${{ github.run_attempt }}
          path: |
            artifacts/codeql
          if-no-files-found: warn
          retention-days: 14
