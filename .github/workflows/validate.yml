name: Validate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  repo-guards:
    name: Repo guards
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Public hygiene
        run: node Scripts/Validation/check_public_repo_hygiene.mjs

      - name: Forge contract check
        run: node tools/forge/check.mjs

      - name: Syntax check validation scripts
        run: node --check Scripts/Validation/check_public_repo_hygiene.mjs

      - name: Diff whitespace check
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}" HEAD

  unity-tests:
    name: Unity ${{ matrix.testMode }} tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - repo-guards

    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Check Unity serial secret
        id: unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        run: |
          if [[ -n "${UNITY_SERIAL:-}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::UNITY_SERIAL secret is not configured; skipping Unity ${{ matrix.testMode }} tests."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Unity artifact folders
        if: steps.unity-license.outputs.available == 'true'
        run: mkdir -p "artifacts/unity-tests/${{ matrix.testMode }}"

      - name: Restore Unity Library cache
        if: steps.unity-license.outputs.available == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: Library
          key: unity-library-${{ runner.os }}-${{ matrix.testMode }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectSettings.asset') }}
          restore-keys: |
            unity-library-${{ runner.os }}-${{ matrix.testMode }}-
            unity-library-${{ runner.os }}-

      - name: Run Unity ${{ matrix.testMode }} tests
        if: steps.unity-license.outputs.available == 'true'
        id: unity-tests
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          unityVersion: auto
          testMode: ${{ matrix.testMode }}
          artifactsPath: artifacts/unity-tests/${{ matrix.testMode }}
          customParameters: -logFile /github/workspace/artifacts/unity-tests/${{ matrix.testMode }}/unity-${{ matrix.testMode }}.log
          runAsHostUser: true

      - name: Upload Unity ${{ matrix.testMode }} logs and test results
        if: always() && steps.unity-license.outputs.available == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unity-${{ matrix.testMode }}-results-${{ github.run_attempt }}
          path: |
            artifacts/unity-tests/${{ matrix.testMode }}
          if-no-files-found: warn
          retention-days: 14

  # Future Codex review/autofix work should be added as a separate job after
  # repo-guards or unity-tests. Keep AI secrets step-scoped and grant write
  # permissions only to that isolated job.
